openapi: 3.0.0
info:
  title: MyVPN WebSocket Gateway
  version: 1.0.0
  description: |
    Yandex API Gateway specification for the MyVPN over WebSocket transport.

    The gateway accepts client WebSocket connections at /ws and forwards every
    $connect / $message / $disconnect event to the VPN server's HTTP webhook.
    The VPN server pushes packets back to clients via the Connection
    Management API (apigateway-connections.api.cloud.yandex.net).

    Replace VPN_SERVER_URL below with the public HTTPS URL of your VPN server's
    webhook endpoint, e.g. https://vpn.example.com:8080/ws

paths:
  /ws:
    x-yc-apigateway-websocket-connect:
      x-yc-apigateway-integration:
        type: http
        url: https://VPN_SERVER_URL/ws
        method: POST
        headers:
          X-Yc-Apigateway-Websocket-Connection-Id: '{X-Yc-Apigateway-Websocket-Connection-Id}'
          X-Yc-Apigateway-Websocket-Event-Type: 'CONNECT'
          X-Yc-Apigateway-Websocket-Connected-At: '{X-Yc-Apigateway-Websocket-Connected-At}'
        timeouts:
          connect: 5
          read: 30
    x-yc-apigateway-websocket-message:
      x-yc-apigateway-integration:
        type: http
        url: https://VPN_SERVER_URL/ws
        method: POST
        headers:
          X-Yc-Apigateway-Websocket-Connection-Id: '{X-Yc-Apigateway-Websocket-Connection-Id}'
          X-Yc-Apigateway-Websocket-Event-Type: 'MESSAGE'
        timeouts:
          connect: 5
          read: 60
    x-yc-apigateway-websocket-disconnect:
      x-yc-apigateway-integration:
        type: http
        url: https://VPN_SERVER_URL/ws
        method: POST
        headers:
          X-Yc-Apigateway-Websocket-Connection-Id: '{X-Yc-Apigateway-Websocket-Connection-Id}'
          X-Yc-Apigateway-Websocket-Event-Type: 'DISCONNECT'
          X-Yc-Apigateway-Websocket-Disconnect-Status-Code: '{X-Yc-Apigateway-Websocket-Disconnect-Status-Code}'
          X-Yc-Apigateway-Websocket-Disconnect-Reason: '{X-Yc-Apigateway-Websocket-Disconnect-Reason}'
        timeouts:
          connect: 5
          read: 10
